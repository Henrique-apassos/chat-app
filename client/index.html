<!DOCTYPE html>
<html>
<head>
    <title>Chapp</title>
</head>
<body>
    <h1>Chat</h1>
    <input type="text" id="mensagemBox" placeholder="Digite uma mensagem..."/>
    <button onclick="enviarMensagem()">Enviar</button>
    <ul id="historico"></ul>

    <script>
        // Conecta no seu servidor FastAPI
        var ws = new WebSocket("ws://localhost:8000/ws");

        // O que fazer quando receber uma mensagem dos outros
        ws.onmessage = function(event) {
            var historico = document.getElementById('historico');
            var novaLinha = document.createElement('li');
            novaLinha.innerHTML = "<b>Outro computador:</b> " + event.data;
            historico.appendChild(novaLinha);
        };

        // Função do botão para enviar mensagem
        function enviarMensagem() {
            var input = document.getElementById("mensagemBox");
            ws.send(input.value); // Envia para o Python
            
            // Adiciona a própria mensagem na tela
            var historico = document.getElementById('historico');
            var novaLinha = document.createElement('li');
            novaLinha.innerHTML = "<b>Você:</b> " + input.value;
            historico.appendChild(novaLinha);
            
            input.value = ''; // Limpa a caixa de texto
        }
    </script>
</body>
</html>
